<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Հարսանեկան Սրահ 💍</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', sans-serif; overscroll-behavior: none; background-color: #EEF2E4; color: #787878; }
    .font-cormorant { font-family: 'Cormorant Garamond', serif; }

    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-thumb { background: #7D936C; border-radius: 10px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

    .bottom-nav-btn { transition: all 0.18s; }
    .bottom-nav-btn.active .nav-icon { transform: translateY(-2px); }
    .bottom-nav-btn.active .nav-label { color: #7D936C; font-weight: 600; }
    .bottom-nav-btn.active .nav-icon-wrap { background: rgba(125, 147, 108, 0.15); }

    .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(68, 94, 63, 0.6);
        backdrop-filter: blur(6px);
        display: none; align-items: flex-end; justify-content: center;
        z-index: 300;
    }
    .modal-overlay.open { display: flex; }
    .modal-sheet {
        background: #FFFFFF;
        border-radius: 20px 20px 0 0;
        width: 100%; max-height: 92vh;
        overflow-y: auto;
        padding-bottom: env(safe-area-inset-bottom, 16px);
        animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp {
        from { transform: translateY(40px); opacity: 0.6; }
        to   { transform: translateY(0);    opacity: 1; }
    }
    .modal-handle { width: 36px; height: 4px; background: #7D936C; border-radius: 2px; margin: 10px auto 0; }

    .table-card-map { background: #EEF2E4; border: 2px solid #7D936C; }
    .table-card-map.round { border-radius: 50%; }
    .table-card-map.presidium { border-radius: 6px; background: #445E3F; border-color: #445E3F; }
    .table-card-map.rectangle, .table-card-map.double_rectangle { border-radius: 8px; }

    /* Side border accents */
    .table-card-side-bride { border-left: 3px solid #7D936C !important; }
    .table-card-side-groom { border-left: 3px solid #7D936C !important; }
    .table-card-side-mutual { border-left: 3px solid #7D936C !important; }

    input, select, button { font-size: 16px; }
    .progress-bar { height: 3px; background: #EEF2E4; border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background-color: #7D936C !important; border-radius: 2px; transition: width 0.3s; }

    .guest-members-panel { max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }
    .guest-members-panel.open { max-height: 400px; }

    input:focus, select:focus, button:focus { outline: none; }
    .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 8px); }

    /* Side selection buttons */
    .side-btn { transition: all 0.15s; }
    .side-btn.active-bride  { border-color: #7D936C !important; background: rgba(125, 147, 108, 0.1); color: #7D936C; }
    .side-btn.active-groom  { border-color: #7D936C !important; background: rgba(125, 147, 108, 0.1); color: #7D936C; }
    .side-btn.active-mutual { border-color: #7D936C !important; background: rgba(125, 147, 108, 0.1); color: #445E3F; }

    /* Նոր ավատարների կլորներ */
    .guest-avatar-circle {
        width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
        border-radius: 50%; background: #EEF2E4; border: 1px solid #7D936C;
        font-size: 8px; color: #445E3F; font-weight: bold;
    }

        /* Համատարած գույների թարմացում */
/* Վերևի հեդեր */
header { background-color: #445E3F !important; }

/* Ներքևի նավիգացիա */
.bottom-nav { background-color: #445E3F !important; }

/* Մուգ գույն ունեցող կոճակներ */
.bg-[#1a1612] { background-color: #445E3F !important; }

/* Ակտիվ կոճակների տեքստ (օրինակ՝ "Բոլորը" կոճակը) */
.bg-[#1a1612] { color: #FFFFFF !important; }

/* Ընդհանուր էջի ֆոն */
body { background-color: #EEF2E4 !important; }

/* Ներքևի մենյուի ակտիվ վիճակի գույն */
.bottom-nav-btn.active .nav-label { color: #7D936C !important; }
.bottom-nav-btn.active .nav-icon-wrap { background: rgba(125, 147, 108, 0.2) !important; }



</style>
</head>
<body class="bg-[#f7f3ee] text-[#1a1612] h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<header class="bg-[#1a1612] flex items-center justify-between px-4 flex-shrink-0 z-50" style="height:52px;">
    <a href="/" class="text-[#e8d5b0] opacity-60 text-xl leading-none">←</a>
    <h1 id="headerTitle" class="font-cormorant text-[#e8d5b0] text-lg font-semibold tracking-wide truncate mx-3 flex-1 text-center">Բեռնվում է...</h1>
    <button onclick="exportToPDF()" class="text-[#c9a96e] text-xs font-semibold flex-shrink-0">PDF</button>
</header>

<div class="flex-1 flex flex-col overflow-hidden">

    <!-- ══ TAB 1: ՀՅՈՒՐԵՐ ══ -->
    <div id="tab-guests" class="tab-panel active">
        <div class="bg-[#fefcf9] border-b border-[#e8ddd0] px-4 py-2 flex items-center gap-3 flex-shrink-0">
            <div id="guestSummary" class="text-[11px] text-[#8c7b66] flex-1">Բեռնվում...</div>
            <button onclick="openAddGuestSheet()" class="bg-[#445E3F] text-[#e8d5b0] text-xs font-semibold px-3 py-1.5 rounded-lg">＋ Հյուր</button>
        </div>
        <div class="flex gap-2 px-3 py-2 bg-[#fefcf9] border-b border-[#e8ddd0] flex-shrink-0">
            <button onclick="setGuestFilter('all')"   id="gf-all"   class="gf-pill active flex-1 py-1.5 text-[11px] font-semibold rounded-lg bg-[#445E3F] text-[#e8d5b0]">Բոլորը</button>
            <button onclick="setGuestFilter('bride')" id="gf-bride" class="gf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">👰</button>
            <button onclick="setGuestFilter('groom')" id="gf-groom" class="gf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">🤵</button>
        </div>
        <div id="mergeBar" class="hidden px-3 py-2 bg-[#c4736a]/10 border-b border-[#c4736a]/20 flex-shrink-0">
            <button onclick="mergeSelected()" class="w-full py-2 bg-[#445E3F] text-white rounded-lg text-sm font-semibold">Միավորել</button>
        </div>
        <div id="guestList" class="flex-1 overflow-y-auto px-3 py-2 space-y-2">
            <p class="text-center text-[#8c7b66] text-sm italic py-8">Բեռնվում է...</p>
        </div>
    </div>

    <!-- ══ TAB 2: ՍՐԱՀ ══ -->
    <div id="tab-hall" class="tab-panel">
        <div class="bg-[#fefcf9] border-b border-[#e8ddd0] px-4 py-2 flex items-center gap-2 flex-shrink-0">
            <div id="hallSummary" class="text-[11px] text-[#8c7b66] flex-1"></div>
            <button onclick="openAddTableSheet()" class="bg-[#445E3F] text-[#e8d5b0] text-xs font-semibold px-3 py-1.5 rounded-lg">＋ Սեղան</button>
        </div>
        <!-- Hall side filter -->
        <div class="flex gap-2 px-3 py-2 bg-[#fefcf9] border-b border-[#e8ddd0] flex-shrink-0">
            <button onclick="setHallFilter('all')" id="hf-all" class="hf-pill active flex-1 py-1.5 text-[11px] font-semibold rounded-lg bg-[#445E3F] text-[#e8d5b0]">Բոլորը</button>
            <button onclick="setHallFilter('bride')"  id="hf-bride"  class="hf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">👰</button>
            <button onclick="setHallFilter('groom')"  id="hf-groom"  class="hf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">🤵</button>
            <button onclick="setHallFilter('mutual')" id="hf-mutual" class="hf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">🤝</button>
        </div>
        <div id="tableList" class="flex-1 overflow-y-auto px-3 py-2 space-y-3">
            <p class="text-center text-[#8c7b66] text-sm italic py-8">Բեռնվում է...</p>
        </div>
    </div>

    <!-- ══ TAB 3: ՉՆՍՏԵՑՎԱԾ ══ -->
    <div id="tab-unseated" class="tab-panel">
        <div class="bg-[#fefcf9] border-b border-[#e8ddd0] px-4 py-2 flex-shrink-0">
            <div id="unseatedSummary" class="text-[11px] text-[#8c7b66]">Բեռնվում...</div>
        </div>
        <div class="flex gap-2 px-3 py-2 bg-[#fefcf9] border-b border-[#e8ddd0] flex-shrink-0">
            <button onclick="setUnseatedFilter('all')"   id="uf-all"   class="uf-pill active flex-1 py-1.5 text-[11px] font-semibold rounded-lg bg-[#445E3F] text-[#e8d5b0]">Բոլորը</button>
            <button onclick="setUnseatedFilter('bride')" id="uf-bride" class="uf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">👰</button>
            <button onclick="setUnseatedFilter('groom')" id="uf-groom" class="uf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]">🤵</button>
        </div>
        <div id="unseatedList" class="flex-1 overflow-y-auto px-3 py-2 space-y-2">
            <p class="text-center text-[#8c7b66] text-sm italic py-8">Բեռնվում է...</p>
        </div>
    </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav bg-[#1a1612] flex flex-shrink-0 border-t border-[#2d2520]">
    <button onclick="switchTab('guests')" id="nav-guests" class="bottom-nav-btn active flex-1 flex flex-col items-center pt-2 pb-1">
        <div class="nav-icon-wrap w-10 h-8 rounded-xl flex items-center justify-center mb-0.5"><span class="nav-icon text-xl">👥</span></div>
        <span class="nav-label text-[10px] text-[#c9a96e] font-semibold">Հյուրեր</span>
    </button>
    <button onclick="switchTab('hall')" id="nav-hall" class="bottom-nav-btn flex-1 flex flex-col items-center pt-2 pb-1">
        <div class="nav-icon-wrap w-10 h-8 rounded-xl flex items-center justify-center mb-0.5"><span class="nav-icon text-xl">🪑</span></div>
        <span class="nav-label text-[10px] text-[#8c7b66]">Սրահ</span>
    </button>
    <button onclick="switchTab('unseated')" id="nav-unseated" class="bottom-nav-btn flex-1 flex flex-col items-center pt-2 pb-1">
        <div class="nav-icon-wrap w-10 h-8 rounded-xl flex items-center justify-center mb-0.5"><span class="nav-icon text-xl">⏳</span></div>
        <span class="nav-label text-[10px] text-[#8c7b66]">Չնստեցված</span>
    </button>
</nav>

<!-- ═══ MODALS ═══ -->

<!-- Add Guest -->
<div class="modal-overlay" id="addGuestModal" onclick="closeModal('addGuestModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-2 border-b border-[#e8ddd0]"><div class="font-cormorant text-xl font-bold">Ավելացնել հյուր</div></div>
        <div class="p-5 space-y-4">
            <div>
                <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Անուն</label>
                <input id="m_guestName" type="text" placeholder="Օր.՝ Մարգարյանների ընտանիք"
                    class="w-full px-4 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm text-[#1a1612]" style="font-size:16px;">
            </div>
            <div class="flex gap-3">
                <div class="flex-1">
                    <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Քանակ</label>
                    <div class="flex items-center gap-2 bg-[#f7f3ee] rounded-xl border border-[#e8ddd0] px-3 py-2.5">
                        <button onclick="changeM('m_guestCount',-1)" class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white flex items-center justify-center text-lg">−</button>
                        <span id="m_guestCountDisplay" class="font-cormorant text-2xl font-bold flex-1 text-center">1</span>
                        <button onclick="changeM('m_guestCount',1)"  class="w-8 h-8 rounded-full border border-[#e8ddd0] bg-white flex items-center justify-center text-lg">+</button>
                    </div>
                    <input type="hidden" id="m_guestCount" value="1">
                </div>
                <div class="flex-1">
                    <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Կողմ</label>
                    <select id="m_guestSide" class="w-full px-3 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm" style="font-size:16px;">
                        <option value="bride">👰 Հարս</option>
                        <option value="groom">🤵 Փեսա</option>
                    </select>
                </div>
            </div>
            <button onclick="submitAddGuest()" class="w-full py-3.5 bg-[#445E3F] text-[#e8d5b0] rounded-xl text-sm font-semibold">Ավելացնել</button>
        </div>
    </div>
</div>

<!-- Add Table -->
<div class="modal-overlay" id="addTableModal" onclick="closeModal('addTableModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-2 border-b border-[#e8ddd0]"><div class="font-cormorant text-xl font-bold">Ավելացնել սեղան</div></div>
        <div class="p-5 space-y-4">
            <!-- Category -->
            <div>
                <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-2">Տեսակ</label>
                <div class="grid grid-cols-2 gap-2" id="catPicker">
                    <button onclick="selectCat('round')"            class="cat-btn rounded-xl border-2 border-[#e8ddd0] p-3 text-sm font-medium text-[#5c4f3d] flex items-center gap-2">⭕ Կլոր</button>
                    <button onclick="selectCat('rectangle')"        class="cat-btn rounded-xl border-2 border-[#e8ddd0] p-3 text-sm font-medium text-[#5c4f3d] flex items-center gap-2">▬ Ուղղանկյուն</button>
                    <button onclick="selectCat('double_rectangle')" class="cat-btn rounded-xl border-2 border-[#e8ddd0] p-3 text-sm font-medium text-[#5c4f3d] flex items-center gap-2">▬▬ Կրկնակի</button>
                    <button onclick="selectCat('presidium')"        class="cat-btn rounded-xl border-2 border-[#e8ddd0] p-3 text-sm font-semibold text-[#8a6c30] flex items-center gap-2">👑 Պրեզիդիում</button>
                </div>
            </div>
            <!-- Side selection -->
            <div>
                <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-2">Կողմ</label>
                <div class="flex gap-2">
                    <button onclick="selectTableSide('bride')"  id="mts-bride"  class="side-btn flex-1 py-2.5 rounded-xl border-2 border-[#e8ddd0] text-sm font-semibold text-[#5c4f3d]">👰 Հարս</button>
                    <button onclick="selectTableSide('groom')"  id="mts-groom"  class="side-btn flex-1 py-2.5 rounded-xl border-2 border-[#e8ddd0] text-sm font-semibold text-[#5c4f3d]">🤵 Փեսա</button>
                    <button onclick="selectTableSide('mutual')" id="mts-mutual" class="side-btn flex-1 py-2.5 rounded-xl border-2 border-[#c9a96e] text-sm font-semibold active-mutual">🤝</button>
                </div>
            </div>
            <!-- Number -->
            <div>
                <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Համար</label>
                <input id="m_tableNumber" type="text" placeholder="Օր.՝ 1, A, VIP..."
                    class="w-full px-4 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm" style="font-size:16px;">
            </div>
            <!-- Capacity -->
            <div>
                <label class="block text-[11px] font-semibold text-[#8c7b66] uppercase tracking-wider mb-1.5">Աթոռ</label>
                <div class="flex items-center gap-3 bg-[#f7f3ee] rounded-xl border border-[#e8ddd0] px-4 py-3">
                    <button onclick="changeM('m_tableCapacity',-1)" class="w-10 h-10 rounded-full border border-[#e8ddd0] bg-white flex items-center justify-center text-xl">−</button>
                    <span id="m_tableCapacityDisplay" class="font-cormorant text-4xl font-bold flex-1 text-center text-[#1a1612]">10</span>
                    <button onclick="changeM('m_tableCapacity',1)"  class="w-10 h-10 rounded-full border border-[#e8ddd0] bg-white flex items-center justify-center text-xl">+</button>
                </div>
                <input type="hidden" id="m_tableCapacity" value="10">
            </div>
            <button onclick="submitAddTable()" class="w-full py-3.5 bg-[#445E3F] text-[#e8d5b0] rounded-xl text-sm font-semibold">Ավելացնել</button>
        </div>
    </div>
</div>

<!-- Table Detail -->
<div class="modal-overlay" id="tableDetailModal" onclick="closeModal('tableDetailModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-3 border-b border-[#e8ddd0] flex items-center justify-between">
            <div id="tableDetailTitle" class="font-cormorant text-xl font-bold"></div>
            <div id="tableDetailMeta" class="text-[11px] text-[#8c7b66]"></div>
        </div>
        <div id="tableDetailBody" class="p-4 space-y-2 pb-6"></div>
    </div>
</div>

<!-- Table Picker -->
<div class="modal-overlay" id="tablePickerModal" onclick="closeModal('tablePickerModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-3 border-b border-[#e8ddd0]"><div id="tablePickerTitle" class="font-cormorant text-xl font-bold">Ընտրել սեղան</div></div>
        <div id="tablePickerList" class="p-4 space-y-2 pb-8 overflow-y-auto" style="max-height:60vh;"></div>
    </div>
</div>

<!-- Guest Picker -->
<div class="modal-overlay" id="guestPickerModal" onclick="closeModal('guestPickerModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-3 border-b border-[#e8ddd0]"><div class="font-cormorant text-xl font-bold">Ընտրել հյուր</div></div>
        <div id="guestPickerList" class="p-4 space-y-2 pb-8 overflow-y-auto" style="max-height:60vh;"></div>
    </div>
</div>

<!-- Rename -->
<div class="modal-overlay" id="renameMemberModal" onclick="closeModal('renameMemberModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-3 border-b border-[#e8ddd0]"><div class="font-cormorant text-xl font-bold">Անուն</div></div>
        <div class="p-5 space-y-4">
            <input id="renameInput" type="text" class="w-full px-4 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm" style="font-size:16px;">
            <button id="renameConfirmBtn" class="w-full py-3.5 bg-[#445E3F] text-[#e8d5b0] rounded-xl text-sm font-semibold">Պահպանել ✓</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="mergeNameModal" onclick="closeModal('mergeNameModal')">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="px-5 pt-4 pb-3 border-b border-[#e8ddd0]"><div class="font-cormorant text-xl font-bold">Միավորել հյուրերին</div></div>
        <div class="p-5 space-y-4">
            <input id="mergeNameInput" type="text" placeholder="Նոր ընտանիքի անունը..." class="w-full px-4 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm" style="font-size:16px;">

<script>

const weddingId    = {{ wedding_id }};
const weddingToken = "{{ wedding_token }}";

/**
 * WA — single source of truth for mobile-manage.html.
 *
 * RULE: Zero GET requests after mutations.
 * Every write (POST/PUT/DELETE) returns the full updated object from the
 * server. We patch WA.state directly from that response and re-render only
 * the panels that changed. updateAppState() is the ONLY function that does
 * a bulk reload, and it runs exactly once — on page load.
 */
const WA = {
    weddingId, weddingToken,
    catLabel: { round:'Կլոր', rectangle:'Ուղղանկյուն', double_rectangle:'Կրկնակի', presidium:'Պրեզիդիում' },
    defaultCapacity: { round:12, rectangle:8, double_rectangle:16, presidium:6 },

    state: {
        allGuests: [],
        allTables: [],
        unseatedMembers: [],   // derived — always recomputed from allGuests
    },

    async fetch(url, opts = {}) {
        opts.headers = { ...(opts.headers || {}), "X-Wedding-Token": weddingToken };
        return fetch(url, opts);
    },
    api: {}
};

// ── Derived state ──────────────────────────────────────────────────────────
function _recomputeUnseated() {
    WA.state.unseatedMembers = WA.state.allGuests
        .flatMap(g => g.members)
        .filter(m => m.table_id === null);
}

// ── API layer (all writes return parsed JSON; reads only used at load time) ─
WA.api = {
    getWedding:    async () => { const r = await WA.fetch(`/api/v1/weddings/${weddingId}`); return r.ok ? r.json() : null; },
    getGuests:     async () => { const r = await WA.fetch(`/api/v1/guests/wedding/${weddingId}`); return r.ok ? r.json() : []; },
    getTables:     async () => { const r = await WA.fetch(`/api/v1/tables/wedding/${weddingId}`); return r.ok ? r.json() : []; },

    addGuest: async (n, c, s) => {
        const r = await WA.fetch(`/api/v1/guests/?wedding_id=${weddingId}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wedding_id: weddingId, display_name: n, total_count: c, side: s, status: 'confirmed' }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Սխալ'); }
        return r.json();  // full guest + members
    },

    deleteGuest: async (id) => {
        const r = await WA.fetch(`/api/v1/guests/${id}?wedding_id=${weddingId}`, { method: 'DELETE' });
        return r.ok;
    },

    mergeGuests: async (ids, name) => {
        const r = await WA.fetch(`/api/v1/guests/wedding/${weddingId}/merge`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ guest_ids: ids, new_display_name: name }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Սխալ'); }
        return r.json();  // full merged guest + members
    },

    addTable: async (num, cat, cap, side) => {
        const r = await WA.fetch(`/api/v1/tables/?wedding_id=${weddingId}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ wedding_id: weddingId, table_number: num, category: cat, capacity: cap, side: side || 'mutual' }),
        });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Սխալ'); }
        return r.json();  // full table
    },

    deleteTable: async (id) => {
        const r = await WA.fetch(`/api/v1/tables/${id}?wedding_id=${weddingId}`, { method: 'DELETE' });
        return r.ok;
    },

    updateCapacity: async (id, cap) => {
        const r = await WA.fetch(`/api/v1/tables/${id}/capacity?wedding_id=${weddingId}&capacity=${cap}`, { method: 'PUT' });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Սխ.'); }
        return r.json();  // full updated table
    },

    seatMember: async (mid, tid, sidx) => {
        let u = `/api/v1/guest-members/${mid}/seat?wedding_id=${weddingId}`;
        if (tid  != null) u += `&table_id=${tid}`;
        if (sidx != null) u += `&seat_index=${sidx}`;
        const r = await WA.fetch(u, { method: 'PUT' });
        if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Ազատ տեղ չկա'); }
        return r.json();  // full member
    },

    unseatMember: async (mid) => WA.api.seatMember(mid, null, null),

    renameMember: async (mid, name) => {
        const r = await WA.fetch(`/api/v1/guest-members/${mid}/name?wedding_id=${weddingId}&first_name=${encodeURIComponent(name)}`, { method: 'PUT' });
        if (!r.ok) return null;
        return r.json();  // full member
    },
};

/**
 * Find next free seat_index for a table, purely from in-memory state.
 * No fetch.
 */
WA.findNextFreeSeat = function (tableId) {
    const table = WA.state.allTables.find(t => t.id === tableId);
    if (!table) return null;
    const allMembers = WA.state.allGuests.flatMap(g => g.members);
    const occupied = new Set(
        allMembers.filter(m => m.table_id === tableId && m.seat_index != null).map(m => m.seat_index)
    );
    for (let i = 0; i < table.capacity; i++) if (!occupied.has(i)) return i;
    return null;
};

/** Seat a member on a table, auto-picking the next free seat. Patches state from response. */
WA.seatOnTable = async function (memberId, tableId) {
    const idx = WA.findNextFreeSeat(tableId);
    if (idx === null) throw new Error('Ազատ տեղ չկա');
    const member = await WA.api.seatMember(memberId, tableId, idx);
    patchState({ memberSeated: { memberId, tableId, seatIndex: idx } });
    return member;
};

// ── Surgical patch (mirrors desktop state.js) ────────────────────────────────
/**
 * patchState(changes) — apply known changes to WA.state and re-render only
 * what's affected. Never fetches anything; callers supply data from server
 * responses.
 */
function patchState(changes) {
    let guestsChanged = false;
    let tablesChanged = false;

    if (changes.guests !== undefined) {
        WA.state.allGuests = changes.guests;
        guestsChanged = true;
    }
    if (changes.guestAdded !== undefined) {
        WA.state.allGuests = [...WA.state.allGuests, changes.guestAdded];
        guestsChanged = true;
    }
    if (changes.guestRemoved !== undefined) {
        WA.state.allGuests = WA.state.allGuests.filter(g => g.id !== changes.guestRemoved);
        guestsChanged = true;
    }
    if (changes.guestsMerged !== undefined) {
        const { removedIds, mergedGuest } = changes.guestsMerged;
        WA.state.allGuests = [
            ...WA.state.allGuests.filter(g => !removedIds.includes(g.id)),
            mergedGuest,
        ];
        guestsChanged = true;
    }

    if (changes.tables !== undefined) {
        WA.state.allTables = changes.tables;
        tablesChanged = true;
    }
    if (changes.tableAdded !== undefined) {
        WA.state.allTables = [...WA.state.allTables, changes.tableAdded];
        tablesChanged = true;
    }
    if (changes.tableRemoved !== undefined) {
        const removedId = parseInt(changes.tableRemoved);
        WA.state.allTables = WA.state.allTables.filter(t => t.id !== removedId);
        // Free anyone seated at the removed table
        WA.state.allGuests = WA.state.allGuests.map(g => ({
            ...g,
            members: g.members.map(m =>
                m.table_id === removedId ? { ...m, table_id: null, seat_index: null } : m
            ),
        }));
        tablesChanged = true;
        guestsChanged = true;
    }
    if (changes.tableUpdated !== undefined) {
        WA.state.allTables = WA.state.allTables.map(t =>
            t.id === changes.tableUpdated.id ? changes.tableUpdated : t
        );
        tablesChanged = true;
    }

    if (changes.memberSeated !== undefined) {
        const { memberId, tableId, seatIndex } = changes.memberSeated;
        WA.state.allGuests = WA.state.allGuests.map(g => ({
            ...g,
            members: g.members.map(m =>
                m.id === memberId ? { ...m, table_id: tableId, seat_index: seatIndex } : m
            ),
        }));
        guestsChanged = true;
        tablesChanged = true;
    }
    if (changes.memberUnseated !== undefined) {
        const { memberId } = changes.memberUnseated;
        WA.state.allGuests = WA.state.allGuests.map(g => ({
            ...g,
            members: g.members.map(m =>
                m.id === memberId ? { ...m, table_id: null, seat_index: null } : m
            ),
        }));
        guestsChanged = true;
        tablesChanged = true;
    }
    if (changes.memberRenamed !== undefined) {
        const { memberId, firstName } = changes.memberRenamed;
        WA.state.allGuests = WA.state.allGuests.map(g => ({
            ...g,
            members: g.members.map(m =>
                m.id === memberId ? { ...m, first_name: firstName } : m
            ),
        }));
        guestsChanged = true;
        tablesChanged = true;  // chip label on table card changes too
    }

    if (guestsChanged) _recomputeUnseated();

    // ── Re-render only what changed, only the active tab gets a "live" render,
    //    but since DOM nodes for all tabs persist, just re-render whichever
    //    panels are affected regardless of which tab is visible. ──
    if (guestsChanged) {
        renderGuests();
        renderUnseated();
    }
    if (tablesChanged) {
        const allMembers = WA.state.allGuests.flatMap(g => g.members);
        renderTables(WA.state.allTables, allMembers);
        const seated = allMembers.filter(m => m.table_id != null).length;
        const totalSeats = WA.state.allTables.reduce((s, t) => s + t.capacity, 0);
        document.getElementById('hallSummary').innerText = `${WA.state.allTables.length} սեղան · ${seated}/${totalSeats} նստեցված`;
    }

    // If the table detail sheet is open for a table that just changed, refresh it in place
    if (typeof window.activeTableId !== 'undefined' && window.activeTableId !== null) {
        const detailModal = document.getElementById('tableDetailModal');
        if (detailModal && detailModal.classList.contains('open')) {
            renderTableDetailFromState(window.activeTableId);
        }
    }
}

// ── Full reload — used ONLY on initial page load ─────────────────────────────
async function updateAppState() {
    const [guests, tables] = await Promise.all([WA.api.getGuests(), WA.api.getTables()]);
    WA.state.allGuests = guests;
    WA.state.allTables = tables;
    _recomputeUnseated();
    renderGuests();
    renderUnseated();
    const allMembers = guests.flatMap(g => g.members);
    renderTables(tables, allMembers);
    const seated = allMembers.filter(m => m.table_id != null).length;
    const totalSeats = tables.reduce((s, t) => s + t.capacity, 0);
    document.getElementById('hallSummary').innerText = `${tables.length} սեղան · ${seated}/${totalSeats} նստեցված`;
}

let currentTab        = 'guests';
let guestFilter        = 'all';
let unseatedFilter     = 'all';
let hallFilter          = 'all';
let selectedGuests     = [];
let pendingSeatGuest   = null;
let pendingSeatCount   = 1;
let selectedCat        = null;
let selectedTableSide  = 'mutual';
const openedGroups     = new Set();

document.addEventListener('DOMContentLoaded', async () => {
    const w = await WA.api.getWedding();
    if (w) { document.getElementById('headerTitle').innerText = w.title; document.title = w.title; }
    await updateAppState();
});

// Tab switching
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.querySelectorAll('.bottom-nav-btn').forEach(b => {
        b.classList.remove('active');
        b.querySelector('.nav-label').style.color = '#8c7b66';
        b.querySelector('.nav-icon-wrap').style.background = 'transparent';
    });
    const nb = document.getElementById(`nav-${tab}`);
    nb.classList.add('active');
    nb.querySelector('.nav-label').style.color = '#c9a96e';
    nb.querySelector('.nav-icon-wrap').style.background = 'rgba(201,169,110,0.12)';
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
    document.getElementById(id).classList.remove('open');
    if (id === 'tableDetailModal') window.activeTableId = null;
}
function changeM(fieldId, delta) {
    const input = document.getElementById(fieldId);
    const display = document.getElementById(fieldId + 'Display');
    let val = parseInt(input.value) + delta;
    if (fieldId === 'm_guestCount')    val = Math.max(1, Math.min(100, val));
    if (fieldId === 'm_tableCapacity') val = Math.max(1, Math.min(60, val));
    if (fieldId === 'm_editCapacity')  val = Math.max(1, Math.min(60, val));
    if (fieldId === 'm_seatCount')     val = Math.max(1, Math.min(parseInt(input.max) || 100, val));
    input.value = val;
    if (display) display.innerText = val;
}

// ── HALL FILTER (local — no fetch) ───────────────────────────────────────────
function setHallFilter(f) {
    hallFilter = f;
    document.querySelectorAll('.hf-pill').forEach(b => {
        b.className = 'hf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]';
    });
    document.getElementById(`hf-${f}`).className = 'hf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg bg-[#445E3F] text-[#e8d5b0]';
    const allMembers = WA.state.allGuests.flatMap(g => g.members);
    renderTables(WA.state.allTables, allMembers);
}

// ── GUESTS ────────────────────────────────────────────────────────────────────
function setGuestFilter(f) {
    guestFilter = f;
    document.querySelectorAll('.gf-pill').forEach(b => {
        b.className = 'gf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg text-[#5c4f3d] bg-white border border-[#e8ddd0]';
    });
    document.getElementById(`gf-${f}`).className = 'gf-pill flex-1 py-1.5 text-[11px] font-semibold rounded-lg bg-[#445E3F] text-[#e8d5b0]';
    renderGuests();
}

function renderGuests() {
    const container = document.getElementById('guestList');
    const total = WA.state.allGuests.reduce((s, g) => s + g.total_count, 0);
    const seated = WA.state.allGuests.flatMap(g => g.members).filter(m => m.table_id).length;
    document.getElementById('guestSummary').innerText = `${WA.state.allGuests.length} հրավիրված · ${seated}/${total} նստեցված`;
    const filtered = WA.state.allGuests.filter(g => guestFilter === 'all' || g.side === guestFilter);
    if (!filtered.length) { container.innerHTML = '<p class="text-center text-[#8c7b66] text-sm italic py-8">Հյուրեր չկան</p>'; return; }
    container.innerHTML = '';
    filtered.forEach(guest => {
        const sideIcon = { bride: '👰', groom: '🤵', mutual: '🤝' }[guest.side] || '';
        const sideCls  = { bride: 'text-[#c4736a]', groom: 'text-[#7a9e7e]', mutual: 'text-[#8a6c30]' }[guest.side] || '';
        const seatedCnt = guest.members.filter(m => m.table_id).length;
        const pct = guest.total_count ? Math.round(seatedCnt / guest.total_count * 100) : 0;
        const isOpen = openedGroups.has(guest.id);
        const card = document.createElement('div');
        card.className = 'bg-white rounded-2xl border border-[#e8ddd0] overflow-hidden shadow-sm';
        card.innerHTML = `
            <div class="flex items-center gap-2 px-3 py-3 cursor-pointer" onclick="toggleGuestGroup(${guest.id},this)">
                <input type="checkbox" value="${guest.id}" onchange="toggleGuestSelect(this)" onclick="event.stopPropagation()" class="flex-shrink-0 w-4 h-4 accent-[#c4736a]">
                <span class="text-sm font-semibold flex-1 truncate">${guest.display_name}</span>
                <span class="text-xs ${sideCls}">${sideIcon}</span>
                <span class="text-[11px] bg-[#f7f3ee] border border-[#e8ddd0] text-[#5c4f3d] px-1.5 py-0.5 rounded-full">${seatedCnt}/${guest.total_count}</span>
                <button onclick="event.stopPropagation();confirmDeleteGuest(${guest.id},'${guest.display_name.replace(/'/g, "\\'")}')">🗑</button>
                <span class="text-[#c8bfb2] text-xs">${isOpen ? '▲' : '▼'}</span>
            </div>
            <div class="px-3 pb-1"><div class="progress-bar"><div class="progress-fill ${pct === 100 ? 'bg-[#7a9e7e]' : 'bg-[#c9a96e]'}" style="width:${pct}%"></div></div></div>
            <div class="guest-members-panel ${isOpen ? 'open' : ''}" id="gmp-${guest.id}">
                <div class="border-t border-[#f7f3ee]">
                    ${guest.members.map(m => `
                        <div class="flex items-center gap-2 px-6 py-2 text-xs text-[#5c4f3d] border-b border-[#f7f3ee] last:border-0">
                            <span class="flex-1">${m.first_name || '(անանուն)'}</span>
                            ${m.table_id ? '<span class="text-[9px] bg-[#7a9e7e]/10 text-[#7a9e7e] px-1.5 py-0.5 rounded-full">✓</span>' : ''}
                            <button onclick="openRename(${m.id},'${(m.first_name || '').replace(/'/g, "\\'")}')" class="text-[#8c7b66] text-xs">✏</button>
                        </div>`).join('')}
                </div>
            </div>`;
        container.appendChild(card);
    });
}

function toggleGuestGroup(id, headerEl) {
    const panel = document.getElementById(`gmp-${id}`);
    const arrow = headerEl.querySelector('span:last-child');
    if (panel.classList.contains('open')) { panel.classList.remove('open'); openedGroups.delete(id); if (arrow) arrow.innerText = '▼'; }
    else { panel.classList.add('open'); openedGroups.add(id); if (arrow) arrow.innerText = '▲'; }
}
function toggleGuestSelect(cb) {
    const id = parseInt(cb.value);
    if (cb.checked) selectedGuests.push(id); else selectedGuests = selectedGuests.filter(x => x !== id);
    document.getElementById('mergeBar').classList.toggle('hidden', selectedGuests.length < 2);
}
function mergeSelected() {
    openModal('mergeNameModal');
    document.getElementById('mergeConfirmBtn').onclick = async () => {
        const name = document.getElementById('mergeNameInput').value.trim();
        if (!name) return;
        try {
            const mergedGuest = await WA.api.mergeGuests(selectedGuests, name);
            const removedIds = [...selectedGuests];
            selectedGuests = [];
            document.getElementById('mergeBar').classList.add('hidden');
            closeModal('mergeNameModal');
            document.getElementById('mergeNameInput').value = '';
            // ✅ No GET — patch state directly from server response
            patchState({ guestsMerged: { removedIds, mergedGuest } });
        } catch (e) {
            alert(e.message);
        }
    };
}

function openAddGuestSheet() {
    document.getElementById('m_guestName').value = '';
    document.getElementById('m_guestCount').value = 1;
    document.getElementById('m_guestCountDisplay').innerText = 1;
    openModal('addGuestModal');
    setTimeout(() => document.getElementById('m_guestName').focus(), 250);
}
async function submitAddGuest() {
    const name  = document.getElementById('m_guestName').value.trim();
    const count = parseInt(document.getElementById('m_guestCount').value);
    const side  = document.getElementById('m_guestSide').value;
    if (!name) { document.getElementById('m_guestName').focus(); return; }

/**
 * FIX: no more `window.renderPicker`. The render function and its filter
 * buttons stay entirely inside this closure. No global is touched, so each
 * call to this function creates one self-contained closure that becomes
 * fully eligible for garbage collection once the modal is closed and a new
 * call replaces it — nothing lingers in `window`.
 */
function openGuestPickerForTable(tableId) {
    const list = document.getElementById('guestPickerList');
    list.style.height = '60vh';
    list.style.overflowY = 'auto';
    list.style.backgroundColor = '#ffffff';

    function render(filter) {
        list.innerHTML = '';

        const filterContainer = document.createElement('div');
        filterContainer.className = 'sticky top-0 z-50 bg-white pb-3 pt-1';

        const filters = [
            { key: 'all',   label: 'Բոլորը' },
            { key: 'bride', label: '👰' },
            { key: 'groom', label: '🤵' },
        ];

        const row = document.createElement('div');
        row.className = 'flex gap-2';
        filters.forEach(f => {
            const btn = document.createElement('button');
            btn.className = `flex-1 py-1.5 text-[11px] font-semibold rounded-lg ${filter === f.key ? 'bg-[#445E3F] text-[#e8d5b0]' : 'bg-[#f7f3ee] text-[#5c4f3d]'}`;
            btn.innerText = f.label;
            // ✅ Listener bound directly to the local `render` closure — no global lookup.
            btn.addEventListener('click', () => render(f.key));
            row.appendChild(btn);
        });
        filterContainer.appendChild(row);
        list.appendChild(filterContainer);

        const unseatedIds = new Set(WA.state.unseatedMembers.map(m => m.id));
        const filteredGuests = WA.state.allGuests.filter(g => filter === 'all' || g.side === filter);

        const contentDiv = document.createElement('div');
        contentDiv.className = 'px-1 bg-white';

        let any = false;
        filteredGuests.forEach(guest => {
            const um = guest.members.filter(m => unseatedIds.has(m.id));
            if (!um.length) return;
            any = true;

            const hdr = document.createElement('div');
            hdr.className = 'text-[11px] font-bold text-[#8c7b66] uppercase tracking-wider mt-3 mb-1 px-1 bg-white';
            hdr.innerText = guest.display_name;
            contentDiv.appendChild(hdr);

            um.forEach(m => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 rounded-xl border border-[#e8ddd0] bg-white text-sm font-medium flex justify-between items-center mb-1';
                btn.innerHTML = `<span>👤 ${m.first_name || 'Անանուն'}</span><span class="text-[#c9a96e] font-bold text-lg">+</span>`;
                btn.onclick = async () => {
                    try {
                        await WA.seatOnTable(m.id, tableId);
                        closeModal('guestPickerModal');
                    } catch (e) { alert(e.message); }
                };
                contentDiv.appendChild(btn);
            });
        });

        if (!any) {
            contentDiv.innerHTML = '<p class="text-center text-[#8c7b66] text-sm italic py-6">Այս կողմից չնստեցված հյուրեր չկան</p>';
        }

        list.appendChild(contentDiv);
    }

    render('all');
    openModal('guestPickerModal');
}

// Cache so the Armenian font is fetched only once per page session
let _armenianFontBase64 = null;

function _arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
}

async function _loadArmenianFont(doc) {
    if (!_armenianFontBase64) {
        const res = await fetch('https://cdn.jsdelivr.net/fontsource/fonts/noto-sans-armenian@latest/armenian-400-normal.ttf');
        const buf = await res.arrayBuffer();
        _armenianFontBase64 = _arrayBufferToBase64(buf);
    }
    doc.addFileToVFS('NotoSansArmenian.ttf', _armenianFontBase64);
    doc.addFont('NotoSansArmenian.ttf', 'NotoArm', 'normal');
    doc.addFont('NotoSansArmenian.ttf', 'NotoArm', 'bold');
}

/**
 * NotoSansArmenian-ի «armenian» subset-ը ՉՈՒՆԻ թվանշանների (0-9) կամ
 * լատինատառ glyph-ներ (Google/Noto-ի կանոն)։ Դրա համար «Սեղան 1»-ի նման
 * տեքստը պետք է բաժանենք հատվածների՝ հայկական vs ոչ-հայկական, և գծենք
 * առանձին ֆոնտերով։
 */
function _splitRuns(text) {
    const str = String(text == null ? '' : text);
    const runs = [];
    let current = '';
    let currentIsArm = null;
    for (const ch of str) {
        const isArm = /[\u0530-\u058F]/.test(ch);
        if (currentIsArm === null) {
            current = ch;
            currentIsArm = isArm;
        } else if (isArm === currentIsArm) {
            current += ch;
        } else {
            runs.push({ text: current, isArm: currentIsArm });
            current = ch;
            currentIsArm = isArm;
        }
    }
    if (current) runs.push({ text: current, isArm: currentIsArm });
    return runs;
}

/**
 * Ինքնուրույն գծում է cell-ի տեքստը՝ հատված-հատված, ֆոնտը փոխելով
 * հայկական/ոչ-հայկական հատվածների միջև։
 */
function _drawMixedCellText(doc, data) {
    const raw = data.cell.raw;
    if (raw === null || raw === undefined || raw === '') return;

    const fontSize = data.cell.styles.fontSize || 8;
    const isBold   = data.cell.styles.fontStyle === 'bold';
    const padLeft  = data.cell.padding('left');

    let x = data.cell.x + padLeft;
    const fontSizeMm = fontSize / 72 * 25.4; // pt → mm
    const y = data.cell.y + data.cell.height / 2 + fontSizeMm * 0.32;

    doc.setFontSize(fontSize);
    const c = data.cell.styles.textColor;

    _splitRuns(raw).forEach(run => {
        doc.setFont(run.isArm ? 'NotoArm' : 'helvetica', isBold ? 'bold' : 'normal');
        if (Array.isArray(c)) doc.setTextColor(c[0], c[1], c[2]);

        doc.text(run.text, x, y);
        x += doc.getTextWidth(run.text);
    });
}

/**
 * Ֆոնի թույլ երանգ՝ ըստ սեղանի կողմի — փոխարինում է հին «դատարկ տող»
 * անջատիչին, քանի որ պահում ենք էջի տարածքը հյուրերի համար։
 */
function _sideFillColor(sideLabel) {
    switch (sideLabel) {
        case 'Հարսի':     return [250, 235, 233]; // նուրբ վարդագույն
        case 'Փեսայի':    return [233, 241, 233]; // նուրբ կանաչ
        case 'Ընդհանուր': return [248, 242, 230]; // նուրբ ոսկեգույն
        default:          return [255, 255, 255];
    }
}
function _lighten(rgb, amt) {
    return rgb.map(v => Math.min(255, v + amt));
}

/**
 * exportToPDF()
 * Reads from WA.state only — no fetch.
 *
 * Փոփոխություններ.
 * 1) Ավելացված է «Կողմ» սյունակ (Հարսի / Փեսայի / Ընդհանուր) յուրաքանչյուր
 *    սեղանի կողքին։ (Emoji-ները՝ 👰🤵🤝 դիտմամբ ՉԵՆ օգտագործվում PDF-ում,
 *    քանի որ ոչ մի բեռնված ֆոնտ emoji glyph-ներ չունի — կդրվեին դատարկ
 *    քառակուսիներ։ Փոխարենն օգտագործում ենք պարզ հայերեն բառ։)
 * 2) Շատ ավելի սահմանափակ չափսեր (fontSize 8, մինիմալ padding, հանված
 *    հին դատարկ բացատ-տողերը) → մոտ 1.8–2x ավելի շատ հյուր մեկ էջում։
 * 3) Նուրբ գունային շերտավորում ըստ կողմի՝ փոխարինում է հին բացատ-տողին
 *    որպես սեղանների միջև տեսողական անջատիչ։
 */
async function exportToPDF() {
    const tables     = [...WA.state.allTables].sort((a, b) => parseInt(a.table_number) - parseInt(b.table_number));
    const allMembers = WA.state.allGuests.flatMap(g => g.members);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });

    await _loadArmenianFont(doc);

    const titleText = 'Հյուրերի նստեցման ցուցակ';
    doc.setFont('NotoArm', 'bold');
    doc.setFontSize(16);
    doc.text(titleText, 8, 12);

    const sideLabelMap = { bride: 'Հարսի', groom: 'Փեսայի', mutual: 'Ընդհանուր' };

    const rows = [];
    tables.forEach(table => {
        const sideLabel = sideLabelMap[table.side || 'mutual'];
        const here = allMembers
            .filter(m => m.table_id === table.id)
            .sort((a, b) => (a.seat_index || 0) - (b.seat_index || 0));

        if (!here.length) {
            rows.push([sideLabel, `Սեղան ${table.table_number}`, 'Դատարկ', '']);
        } else {
            here.forEach((m, i) => {
                const seatNum = m.seat_index != null ? m.seat_index + 1 : i + 1;
                rows.push([
                    sideLabel,
                    `Սեղան ${table.table_number}`,
                    `Աթոռ ${seatNum}`,
                    m.first_name || 'Անանուն',
                ]);
            });
        }
        // ✅ Հին «դատարկ տողը» հանված է՝ տեղ խնայելու համար.
        // սեղանների միջև անջատիչը հիմա գունային շերտավորումն է (ստորև)։
    });

    let lastTableLabel = null;
    let bandToggle = false;

    doc.autoTable({
        startY:      17,
        margin:      { top: 10, left: 8, right: 8, bottom: 10 },
        head:        [['Կողմ', 'Սեղան', 'Աթոռ', 'Անուն']],
        body:        rows,
        theme:       'grid',
        headStyles:  { fillColor: [26, 22, 18], textColor: [232, 213, 176], fontStyle: 'bold', font: 'NotoArm', fontSize: 9 },
        styles:      { fontSize: 8, cellPadding: { top: 1.2, right: 2, bottom: 1.2, left: 2 }, font: 'NotoArm' },
        columnStyles: {
            0: { fontStyle: 'bold', cellWidth: 22 },
            1: { fontStyle: 'bold', cellWidth: 24 },
            2: { cellWidth: 20 },
        },
        didParseCell: (data) => {
            if (data.section === 'body') {
                const rowRaw     = data.row.raw;
                const sideLabel  = rowRaw[0];
                const tableLabel = rowRaw[1];
                if (tableLabel !== lastTableLabel) {
                    bandToggle = !bandToggle;
                    lastTableLabel = tableLabel;
                }
                const base = _sideFillColor(sideLabel);
                data.cell.styles.fillColor = bandToggle ? base : _lighten(base, 6);
            }
            data.cell.text = [' '];
        },
        didDrawCell: (data) => {
            _drawMixedCellText(doc, data);
        },
    });

    doc.save(`wedding_${weddingId}.pdf`);
}
</script>
