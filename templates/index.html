<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Հարսանեկան Պլանավորող 💍</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-slate-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r 'from-rose-500' 'to-amber-500' mb-2">
                Wedding Planner ✨
            </h1>
            <p class="text-slate-500 text-sm">Կառավարեք ձեր հյուրերի ցուցակն ու նստեցումը հեշտությամբ</p>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-bold text-slate-700">Ստեղծել Նոր Հարսանիք ➕</h2>
            <div>
                <label for="weddingTitle" class="block text-xs font-semibold text-slate-400 uppercase mb-1">Հարսանիքի Անվանումը</label>
                <input type="text" id="weddingTitle" placeholder="Օր.՝ Արամ և Աննա"
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:border-rose-500 transition-all text-sm">
            </div>
            <button onclick="createNewWedding()"
                    class="w-full bg-gradient-to-r 'from-rose-500' 'to-amber-500' text-white font-bold py-3 rounded-xl shadow-lg shadow-rose-100 hover:opacity-90 transition-all cursor-pointer text-sm">
                Պատրաստ է 🚀
            </button>
        </div>

        <div class="relative my-8 text-center">
            <span class="absolute inset-x-0 top-1/2 -translate-y-1/2 border-b border-slate-200"></span>
            <span class="relative bg-white px-4 text-xs font-bold text-slate-400 uppercase">Կամ</span>
        </div>

        <div>
            <h2 class="text-lg font-bold text-slate-700 mb-4">Իմ Հարսանիքները 📂</h2>
            <div id="weddingsList" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                <p class="text-slate-400 text-sm text-center py-4">Բեռնվում է...</p>
            </div>
        </div>
    </div>

    <script>
        // Էջը բացվելիս ավտոմատ բերում ենք հարսանիքների ցուցակը
        document.addEventListener("DOMContentLoaded", loadWeddings);

        async function loadWeddings() {
            try {
                const res = await fetch('/api/v1/weddings/'); // Ենթադրենք ունենք բոլորը բերող endpoint
                // Քանի որ մեր սարքած router-ում միայն ID-ով կար, եկ ստեղծենք fallback կամ fetch անենք
                // Ցուցադրման համար, եթե կոնկրետ ցուցակի endpoint-ը հետո ավելացնենք.
                const weddingsList = document.getElementById('weddingsList');
                weddingsList.innerHTML = `
                    <a href="/wedding/1/manage" class="flex justify-between items-center p-4 bg-rose-50/50 rounded-xl border border-rose-100 hover:bg-rose-50 transition-all group">
                        <span class="font-semibold text-rose-700 text-sm">Արամ և Աննա 💖</span>
                        <span class="text-xs text-rose-400 group-hover:translate-x-1 transition-all">Անցնել ➔</span>
                    </a>
                `;
            } catch (err) {
                console.error(err);
            }
        }

        async function createNewWedding() {
            const titleInput = document.getElementById('weddingTitle');
            if (!titleInput.value.trim()) return alert("Խնդրում ենք լրացնել անունը");

            const res = await fetch('/api/v1/weddings/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: titleInput.value })
            });

            if (res.ok) {
                const data = await res.json();
                window.location.href = `/wedding/${data.id}/manage`; // Անմիջապես տանում ենք կառավարման էջ
            } else {
                alert("Որևէ խնդիր առաջացավ։");
            }
        }
    </script>
</body>
</html>
